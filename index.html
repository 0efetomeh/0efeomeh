<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Loading portfolio data..." />
    <title>Efetomeh</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap");

      :root {
        color-scheme: light;
        --paper: #f7f4ef;
        --card: rgba(255, 255, 255, 0.84);
        --ink: #181612;
        --muted: #61584f;
        --line: rgba(24, 22, 18, 0.11);
        --accent: #0c6a64;
        --accent-soft: rgba(12, 106, 100, 0.1);
        --shadow: 0 28px 70px rgba(24, 22, 18, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 4% 3%, rgba(12, 106, 100, 0.14), transparent 28%),
          radial-gradient(circle at 95% 12%, rgba(24, 22, 18, 0.08), transparent 32%),
          linear-gradient(180deg, #faf8f4 0%, var(--paper) 100%);
        color: var(--ink);
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        font-weight: 400;
        line-height: 1.55;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        color: var(--accent);
      }

      .page {
        width: min(1220px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 1rem 0 2rem;
      }

      .layout {
        display: grid;
        gap: 1rem;
      }

      .rail,
      .main,
      .tile {
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        border-radius: 24px;
      }

      .rail {
        display: grid;
        gap: 1rem;
        padding: clamp(1.2rem, 2.2vw, 1.7rem);
      }

      .hero {
        padding: 0.25rem;
      }

      .eyebrow {
        margin-bottom: 0.95rem;
        font-family: "Geist Mono", "Geist", "Trebuchet MS", Arial, sans-serif;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--muted);
      }

      h1 {
        margin-bottom: 0.85rem;
        font-size: clamp(2.3rem, 6vw, 4.1rem);
        line-height: 0.94;
        letter-spacing: -0.03em;
        font-weight: 420;
      }

      .lead {
        margin-bottom: 1.2rem;
        max-width: 38ch;
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        color: var(--muted);
        font-size: clamp(0.98rem, 1.5vw, 1.06rem);
        font-weight: 420;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.62rem;
      }

      .button {
        min-height: 43px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0.66rem 0.9rem;
        border: 1px solid var(--line);
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        font-size: 0.9rem;
        font-weight: 560;
        transition: transform 170ms ease, border-color 170ms ease, background-color 170ms ease;
      }

      .button.primary {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .button.secondary {
        background: transparent;
        color: var(--ink);
      }

      .button:hover {
        transform: translateY(-1px);
        border-color: rgba(24, 22, 18, 0.35);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .meta-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0.72rem;
        background: rgba(255, 255, 255, 0.52);
      }

      .meta-label {
        display: block;
        font-family: "Geist Mono", "Geist", "Trebuchet MS", Arial, sans-serif;
        color: var(--muted);
        font-size: 0.71rem;
        margin-bottom: 0.2rem;
        letter-spacing: 0.04em;
      }

      .meta-value {
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        font-size: 0.93rem;
        font-weight: 560;
      }

      .tile {
        padding: 1rem;
      }

      .section-title {
        margin-bottom: 0.7rem;
        font-family: "Geist Mono", "Geist", "Trebuchet MS", Arial, sans-serif;
        font-size: 0.71rem;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        font-weight: 560;
        color: var(--muted);
      }

      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.58rem;
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
      }

      .list li {
        display: flex;
        justify-content: space-between;
        gap: 0.7rem;
        border-bottom: 1px dashed var(--line);
        padding-bottom: 0.58rem;
      }

      .list li:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .main {
        padding: clamp(1.2rem, 2.3vw, 1.8rem);
        display: grid;
        gap: 1.4rem;
      }

      .bio {
        max-width: 62ch;
        font-size: clamp(1.03rem, 1.4vw, 1.18rem);
        font-weight: 420;
      }

      .projects {
        display: grid;
        gap: 0.8rem;
      }

      .project {
        display: grid;
        gap: 0.33rem;
        padding: 0.95rem 0;
        border-top: 1px solid var(--line);
      }

      .project:first-child {
        padding-top: 0;
        border-top: 0;
      }

      .project-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .project-title {
        margin: 0;
        font-size: 1.07rem;
        font-weight: 560;
      }

      .project-desc,
      .footer {
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        color: var(--muted);
      }

      .tech {
        display: flex;
        flex-wrap: wrap;
        gap: 0.42rem;
      }

      .chip {
        background: var(--accent-soft);
        color: var(--accent);
        border-radius: 999px;
        padding: 0.27rem 0.63rem;
        font-family: "Geist", "Trebuchet MS", Arial, sans-serif;
        font-size: 0.78rem;
      }

      .stack-grid {
        display: grid;
        gap: 1rem;
      }

      .footer {
        border-top: 1px solid var(--line);
        margin-top: 0.3rem;
        padding-top: 0.85rem;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.5rem 1.3rem;
        font-size: 0.88rem;
      }

      @media (min-width: 940px) {
        .layout {
          grid-template-columns: minmax(260px, 0.86fr) minmax(0, 1.38fr);
          align-items: start;
        }

        .rail {
          position: sticky;
          top: 0.9rem;
        }

        .stack-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 1.1rem;
        }
      }

      @media (max-width: 620px) {
        .page {
          width: calc(100% - 1rem);
          padding-top: 0.5rem;
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }

        .project-row,
        .footer {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      .button:focus-visible,
      a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="layout">
        <aside class="rail" aria-labelledby="hero-title">
          <section class="hero">
            <p class="eyebrow" id="hero-eyebrow"></p>
            <h1 id="hero-title"></h1>
            <p class="lead" id="hero-lead"></p>
            <div class="actions">
              <a class="button primary" id="contact-link" href=""></a>
              <a class="button secondary" id="resume-link" href=""></a>
              <a class="button secondary" id="blog-link" href=""></a>
              <a class="button secondary" id="github-link" href="" target="_blank" rel="noreferrer"></a>
            </div>
          </section>

          <section class="tile">
            <div class="meta-grid" id="profile-details-grid" aria-label="Profile details">
              <div class="meta-card">
                <span class="meta-label" id="label-current-role"></span>
                <div class="meta-value" id="current-role"></div>
              </div>
              <div class="meta-card">
                <span class="meta-label" id="label-current-institution"></span>
                <div class="meta-value" id="current-institution"></div>
              </div>
              <div class="meta-card">
                <span class="meta-label" id="label-current-period"></span>
                <div class="meta-value" id="current-period"></div>
              </div>
              <div class="meta-card">
                <span class="meta-label" id="label-availability"></span>
                <div class="meta-value" id="availability"></div>
              </div>
            </div>
          </section>

          <section class="tile" aria-labelledby="social-title">
            <p class="section-title" id="social-title">Social</p>
            <ul class="list" id="social-list"></ul>
          </section>

          <section class="tile" aria-labelledby="focus-title">
            <p class="section-title" id="focus-title">Focus</p>
            <ul class="list" id="focus-list"></ul>
          </section>
        </aside>

        <section class="main" aria-labelledby="work-title">
          <div>
            <p class="section-title" id="about-title">About</p>
            <p class="bio" id="bio"></p>
          </div>

          <div>
            <p class="section-title" id="work-title">Selected work</p>
            <div class="projects" id="projects-list"></div>
          </div>

          <div class="stack-grid">
            <div>
              <p class="section-title" id="education-title">Education</p>
              <div class="projects" id="education-list"></div>
            </div>

            <div>
              <p class="section-title" id="experience-title">Experience</p>
              <div class="projects" id="experience-list"></div>
            </div>
          </div>

          <footer class="footer">
            <span id="footer-note"></span>
            <a id="footer-link" href="#" target="_blank" rel="noreferrer"></a>
          </footer>
        </section>
      </div>
    </main>
    <script type="module">
      const dataUrl = "./data.json";

      const descriptionMeta = document.querySelector('meta[name="description"]');
      const heroEyebrow = document.getElementById("hero-eyebrow");
      const heroTitle = document.getElementById("hero-title");
      const heroLead = document.getElementById("hero-lead");
      const contactLink = document.getElementById("contact-link");
      const currentRole = document.getElementById("current-role");
      const currentInstitution = document.getElementById("current-institution");
      const currentPeriod = document.getElementById("current-period");
      const availability = document.getElementById("availability");
      const profileDetailsGrid = document.getElementById("profile-details-grid");
      const labelCurrentRole = document.getElementById("label-current-role");
      const labelCurrentInstitution = document.getElementById("label-current-institution");
      const labelCurrentPeriod = document.getElementById("label-current-period");
      const labelAvailability = document.getElementById("label-availability");
      const resumeLink = document.getElementById("resume-link");
      const blogLink = document.getElementById("blog-link");
      const footerLink = document.getElementById("footer-link");
      const footerNote = document.getElementById("footer-note");
      const focusTitle = document.getElementById("focus-title");
      const focusList = document.getElementById("focus-list");
      const socialList = document.getElementById("social-list");
      const socialTitle = document.getElementById("social-title");
      const aboutTitle = document.getElementById("about-title");
      const workTitle = document.getElementById("work-title");
      const educationTitle = document.getElementById("education-title");
      const experienceTitle = document.getElementById("experience-title");
      const bio = document.getElementById("bio");
      const projectsList = document.getElementById("projects-list");
      const educationList = document.getElementById("education-list");
      const experienceList = document.getElementById("experience-list");

      function renderPortfolio(portfolioData) {
        const { hero, sections, profile, content, footer } = portfolioData;
        const { projects, education, experience, socials } = content;
        const profileDetailLabels = hero.profileDetailLabels ?? {};

        if (descriptionMeta) {
          descriptionMeta.setAttribute("content", hero.metaDescription);
        }

        document.title = hero.title;

        if (heroEyebrow) heroEyebrow.textContent = `${hero.name} / ${hero.fullName}`;
        if (heroTitle) heroTitle.textContent = hero.headline;
        if (heroLead) {
          heroLead.textContent = `${hero.description.charAt(0).toUpperCase()}${hero.description.slice(1)} ${hero.leadSuffix}`;
        }
        if (contactLink) contactLink.textContent = hero.actions.contact.label;
        if (contactLink) contactLink.setAttribute("href", hero.actions.contact.url);
        if (profileDetailsGrid) profileDetailsGrid.setAttribute("aria-label", hero.profileDetailAriaLabel);
        if (labelCurrentRole) labelCurrentRole.textContent = profileDetailLabels.role;
        if (labelCurrentInstitution) labelCurrentInstitution.textContent = profileDetailLabels.institution;
        if (labelCurrentPeriod) labelCurrentPeriod.textContent = profileDetailLabels.period;
        if (labelAvailability) labelAvailability.textContent = profileDetailLabels.availability;
        if (currentRole) currentRole.textContent = profile.currentRole;
        if (currentInstitution) currentInstitution.textContent = profile.currentInstitution.replace(/^@\s*/, "");
        if (currentPeriod) currentPeriod.textContent = profile.currentPeriod.replace(/—/g, "-");
        if (availability) availability.textContent = profile.availability;
        if (resumeLink) resumeLink.textContent = hero.actions.resume.label;
        if (resumeLink) resumeLink.setAttribute("href", hero.actions.resume.url);
        if (blogLink) blogLink.textContent = hero.actions.blog.label;
        if (blogLink) blogLink.setAttribute("href", hero.actions.blog.url);
        const githubLink = document.getElementById("github-link");
        if (githubLink) githubLink.textContent = hero.actions.github.label;
        if (githubLink) githubLink.setAttribute("href", hero.actions.github.url);
        if (focusTitle) focusTitle.textContent = sections.focus;
        if (socialTitle) socialTitle.textContent = sections.social;
        if (aboutTitle) aboutTitle.textContent = sections.about;
        if (workTitle) workTitle.textContent = sections.selectedWork;
        if (educationTitle) educationTitle.textContent = sections.education;
        if (experienceTitle) experienceTitle.textContent = sections.experience;
        if (footerNote) footerNote.textContent = footer.note;
        if (footerLink) footerLink.textContent = footer.label;
        if (footerLink) footerLink.setAttribute("href", footer.url);
        if (bio) {
          bio.textContent = `${hero.headline} with a practical interest in building reliable systems that are simple to use and difficult to break.`;
        }

        if (focusList) {
          focusList.innerHTML = profile.focus
            .map((item) => `<li><span>${item}</span></li>`)
            .join("");
        }

        if (socialList) {
          socialList.innerHTML = socials
            .map((social) => {
              const handleLabel = social.handle ?? social.name;
              const target = social.url.startsWith("mailto:") ? "_self" : "_blank";
              const rel = social.url.startsWith("mailto:") ? "" : "noreferrer";
              return `<li><span>${social.name}</span><a href="${social.url}" target="${target}" rel="${rel}">${handleLabel}</a></li>`;
            })
            .join("");
        }

        if (projectsList) {
          projectsList.innerHTML = projects
            .map(
              (project) => `
                <article class="project">
                  <div class="project-row">
                    <h3 class="project-title"><a href="${project.url}" target="_blank" rel="noreferrer">${project.title}</a></h3>
                    <span class="project-desc">${project.year} - ${project.role}</span>
                  </div>
                  <p class="project-desc">${project.description.replace(/^.*?:\s*/, "")}</p>
                  <div class="tech">
                    ${project.tech.map((tech) => `<span class="chip">${tech}</span>`).join("")}
                  </div>
                </article>
              `
            )
            .join("");
        }

        if (educationList) {
          educationList.innerHTML = education
            .map(
              (item) => `
                <article class="project">
                  <div class="project-row">
                    <h3 class="project-title">${item.degree}</h3>
                    <span class="project-desc">${item.year}</span>
                  </div>
                  <p class="project-desc">${item.school}</p>
                  <p class="project-desc">${item.description}</p>
                </article>
              `
            )
            .join("");
        }

        if (experienceList) {
          experienceList.innerHTML = experience
            .map(
              (item) => `
                <article class="project">
                  <div class="project-row">
                    <h3 class="project-title">${item.role}</h3>
                    <span class="project-desc">${item.year}</span>
                  </div>
                  <p class="project-desc">${item.company}</p>
                  <p class="project-desc">${item.description}</p>
                </article>
              `
            )
            .join("");
        }
      }

      async function loadPortfolio() {
        let portfolioData = null;

        try {
          const response = await fetch(dataUrl, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to fetch data.json: ${response.status}`);
          }
          portfolioData = await response.json();
        } catch (error) {
          console.warn("Portfolio data could not be fetched.", error);
        }

        if (!portfolioData) {
          if (heroLead) heroLead.textContent = "Portfolio content could not be loaded.";
          return;
        }

        renderPortfolio(portfolioData);
      }

      loadPortfolio();
    </script>
  </body>
</html>
