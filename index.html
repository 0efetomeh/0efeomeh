<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <style>
      :root {
        color-scheme: only light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #000;
        font-family: Arial, sans-serif;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 1.5rem;
        font-size: 2rem;
        font-weight: 500;
      }

      button {
        padding: 0.7rem 1.2rem;
        border: 1px solid #000;
        background: #fff;
        color: #000;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #000;
        color: #fff;
      }

      button:focus-visible {
        outline: 2px solid #000;
        outline-offset: 2px;
        box-shadow: 0 0 0 2px #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Coming Soon</h1>
      <button
        id="visit-site"
        type="button"
        title="Go to efetomeh.vercel.app"
      >
        Visit Website
      </button>
    </main>
    <script>
      const visitSiteButton = document.getElementById("visit-site");

      function goToWebsite() {
        window.location.href = "https://efetomeh.vercel.app";
      }

      visitSiteButton.addEventListener("click", goToWebsite);
    </script>
  </body>
</html>
