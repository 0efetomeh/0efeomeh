    <style>
      :root {

      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff;
        color: #000;
        font-family: Arial, sans-serif;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 1.5rem;
        font-size: 2rem;
        font-weight: 500;
      }

      .button-link {
        display: inline-block;
        padding: 0.7rem 1.2rem;
        border: 1px solid #000;
        background: #fff;
        color: #000;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
      }

      .button-link:hover {
        background: #000;
        color: #fff;
      }

      .button-link:focus-visible {
        outline: 2px solid #000;
        outline-offset: 2px;
